<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edge Logs</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>
  <h1>Edge Logs</h1>
  <table id="logsTable">
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>IP</th>
        <th>Organization</th>
        <th>City</th>
        <th>Postal Code</th>
        <th>Country</th>
      </tr>
    </thead>
    <tbody id="logsBody">
      <!-- Data will be inserted here -->
    </tbody>
  </table>

  <script>
    // Initialize Supabase client
    const dburl = 'https://ohsyvubwgqnlwesxecnb.supabase.co';
    const dbkey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oc3l2dWJ3Z3FubHdlc3hlY25iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDIwODgsImV4cCI6MjA4ODkxODA4OH0.wQaXZRmoCRThU4rlcTPJjdPewiYv63K0vwYQvi91h4M';
    const supabase = supabase.createClient(dburl, dbkey);

    // Fetch data from Supabase
    async function fetchLogs() {
      const { data, error } = await supabase
        .from('edge_logs')
        .select(`
          timestamp,
          metadata:request:headers(x_real_ip),
          metadata:request:cf(asOrganization, city, postalCode, country, latitude, longitude)
        `)
        .not('metadata.request.headers.x_real_ip', 'is', null)
        .not('metadata.request.cf.asOrganization', 'is', null)
        .neq('metadata.request.cf.asOrganization', 'Amazon Data Services Northern Virginia')
        .neq('metadata.request.cf.asOrganization', 'Amazon Technologies Inc.');

      if (error) {
        console.error('Error fetching logs:', error);
        return;
      }

      // Format and display data
      const logsBody = document.getElementById('logsBody');
      data.forEach(log => {
        const row = document.createElement('tr');

        // Format timestamp as hh:mm:ss dd month
        const date = new Date(log.timestamp);
        const formattedTimestamp = date.toLocaleString('en-US', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          day: '2-digit',
          month: 'short'
        });

        // Extract data from nested objects
        const xRealIp = log.metadata.request.headers.x_real_ip;
        const asOrganization = log.metadata.request.cf.asOrganization;
        const city = log.metadata.request.cf.city;
        const postalCode = log.metadata.request.cf.postalCode;
        const country = log.metadata.request.cf.country;

        row.innerHTML = `
          <td>${formattedTimestamp}</td>
          <td>${xRealIp}</td>
          <td>${asOrganization}</td>
          <td>${city}</td>
          <td>${postalCode}</td>
          <td>${country}</td>
        `;

        logsBody.appendChild(row);
      });
    }

    // Call the function to fetch logs
    fetchLogs();
  </script>
</body>
</html>
